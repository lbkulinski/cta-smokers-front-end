<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon-32x32.png" type="image/png" sizes="32x32" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://ctasmokers.com/og-image.png" />
		<style>html,body{background-color:#0d0d0d;color:#e5e5e5}body{visibility:hidden}</style>
		<noscript><style>body{visibility:visible}</style></noscript>
		<script>(function(){function show(){if(document.body&&document.body.style.visibility!=='visible')document.body.style.visibility='visible';}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',show);}else{show();}setTimeout(show,3000);})();</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
