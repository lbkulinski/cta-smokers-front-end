<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <!-- CTA red top bar -->
  <rect width="1200" height="8" fill="#c60c30"/>

  <!-- No-smoking circle, centered at (600, 265) r=170 -->
  <circle cx="600" cy="265" r="170" fill="#161616" stroke="#c60c30" stroke-width="16"/>

  <!-- Cigarette: total width 220, centered at x=600 → x=490 to x=710 -->
  <!-- Body (white paper): x=490 to x=660 -->
  <rect x="490" y="252" width="170" height="26" rx="3" fill="#f0ece0"/>
  <!-- Filter (tan): x=660 to x=710 -->
  <rect x="660" y="252" width="50" height="26" rx="3" fill="#c4814a"/>
  <!-- Lit tip at left end (x=490) -->
  <ellipse cx="492" cy="265" rx="7" ry="10" fill="#ff7722" opacity="0.95"/>
  <ellipse cx="492" cy="265" rx="3.5" ry="5.5" fill="#ffcc55"/>

  <!-- Smoke wisps rising from lit end -->
  <path d="M490 244 Q497 231 490 218 Q483 205 489 192" stroke="#aaaaaa" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M500 241 Q509 226 502 211 Q495 196 501 181" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Diagonal slash at 45°: from (480,145) to (720,385), passes through center (600,265) -->
  <line x1="480" y1="145" x2="720" y2="385" stroke="#c60c30" stroke-width="16" stroke-linecap="round"/>

  <!-- Title -->
  <text x="600" y="512" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="60" fill="#e5e5e5" letter-spacing="2">CTA Smokers</text>
  <!-- Subtitle -->
  <text x="600" y="568" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="26" fill="#777777" letter-spacing="1">Report smoking on CTA trains</text>
</svg>
